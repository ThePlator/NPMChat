name: Label PR from Linked Issues

# Trigger whenever a PR is opened, reopened, or its body is edited.
on:
  pull_request_target:
    types: [opened, reopened, edited]

# Minimal permissions: read issues to get their labels, write PR labels.
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-pr:
    name: Copy labels from linked issues to PR
    runs-on: ubuntu-latest
    steps:
      - name: Apply issue labels to PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            // Collect issue numbers from
            // "Fixes/Closes/Resolves #NNN" (case-insensitive).
            const pattern = /(?:fixes|closes|resolves)\s+#(\d+)/gi;
            const issueNumbers = [];
            let match;
            while ((match = pattern.exec(body)) !== null) {
              issueNumbers.push(parseInt(match[1], 10));
            }

            if (issueNumbers.length === 0) {
              core.info('No linked issues found in PR body — nothing to do.');
              return;
            }

            core.info(`Linked issues: ${issueNumbers.join(', ')}`);

            // Fetch labels from every referenced issue;
            // ignore missing/invalid ones.
            const labelSet = new Set();
            for (const issueNumber of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber,
                });
                for (const label of issue.labels) {
                  labelSet.add(typeof label === 'string' ? label : label.name);
                }
              } catch (err) {
                // Non-existent or inaccessible issue — skip gracefully.
                core.warning(
                  `Could not fetch issue #${issueNumber}: ${err.message}`
                );
              }
            }

            if (labelSet.size === 0) {
              core.info(
                'Referenced issues carry no labels — nothing to apply.'
              );
              return;
            }

            // Determine which labels the PR does not already have.
            const { data: prData } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            const existingLabels = new Set(
              prData.labels.map((l) => (typeof l === 'string' ? l : l.name))
            );
            const toAdd = [...labelSet].filter((l) => !existingLabels.has(l));

            if (toAdd.length === 0) {
              core.info('PR already has all issue labels — nothing to add.');
              return;
            }

            core.info(
              `Adding labels to PR #${prNumber}: ${toAdd.join(', ')}`
            );
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: toAdd,
            });
  heuristic-label-pr:
    name: Auto-Label PR Quality and Complexity (No API Key)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply labels based on PR metadata
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const title = context.payload.pull_request.title.toLowerCase();
            const branch = context.payload.pull_request.head.ref.toLowerCase();
            const additions = context.payload.pull_request.additions;
            const deletions = context.payload.pull_request.deletions;
            const changedFiles = context.payload.pull_request.changed_files;
            const totalChanges = additions + deletions;
            
            const labelsToAdd = new Set();
            
            // 1. Determine TYPE based on conventional commit prefixes or branch names
            if (title.startsWith('feat') || branch.includes('feature')) labelsToAdd.add('type:feature');
            else if (title.startsWith('fix') || title.startsWith('bug') || branch.includes('bug')) labelsToAdd.add('type:bug');
            else if (title.startsWith('docs') || branch.includes('docs')) labelsToAdd.add('type:docs');
            else if (title.startsWith('test') || branch.includes('test')) labelsToAdd.add('type:testing');
            else if (title.startsWith('refactor') || title.startsWith('chore') || branch.includes('refactor')) labelsToAdd.add('type:refactor');
            else if (title.startsWith('perf')) labelsToAdd.add('type:performance');
            else if (title.startsWith('sec')) labelsToAdd.add('type:security');
            else if (title.startsWith('design') || title.includes('ui')) labelsToAdd.add('type:design');
            
            // 2. Determine LEVEL based on size of changes
            if (totalChanges < 30 && changedFiles <= 2) {
              labelsToAdd.add('level:beginner');
            } else if (totalChanges < 150 && changedFiles <= 5) {
              labelsToAdd.add('level:intermediate');
            } else if (totalChanges < 500) {
              labelsToAdd.add('level:advanced');
            } else {
              labelsToAdd.add('level:critical');
            }
            
            // 3. Determine QUALITY (heuristic guess)
            // If it's a feature but includes no tests, it's just 'clean'. If it touches test files, maybe 'exceptional'.
            // For a basic implementation, we can just assign quality:clean.
            labelsToAdd.add('quality:clean');
            
            if (labelsToAdd.size > 0) {
              core.info(`Applying labels: ${Array.from(labelsToAdd).join(', ')}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: Array.from(labelsToAdd)
              });
            } else {
              core.info('No matching labels found based on heuristics.');
            }
